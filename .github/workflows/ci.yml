name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  auth-service:
    name: Auth Service Dependency Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/auth-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install auth-service dependencies
        run: npm install

  task-service:
    name: Task Service Dependency Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/task-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/task-service/package-lock.json

      - name: Install task-service dependencies
        run: npm install

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - frontend
      - auth-service
      - task-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-frontend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for auth-service
        id: meta_auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-auth
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for task-service
        id: meta_task
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-task
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Build auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_auth.outputs.tags }}
          labels: ${{ steps.meta_auth.outputs.labels }}

      - name: Build task-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/task-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_task.outputs.tags }}
          labels: ${{ steps.meta_task.outputs.labels }}